<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  body{background:#1a2744;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:'Segoe UI',sans-serif;gap:20px;}
  .label{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
  .btn{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.4);padding:14px 28px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.06em;text-transform:uppercase;display:inline-flex;align-items:center;gap:10px;}
  .wrap{display:flex;flex-direction:column;align-items:center;}
</style>
</head>
<body>

<div class="wrap">
  <div class="label">Option 1 — Bouclier avec coche (conformité Loi 16)</div>
  <button class="btn">
    <svg viewBox="0 0 28 28" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 4l9 3.5v7c0 5-3.5 8-9 10C8.5 22 5 19 5 14.5V7.5L14 4z"/>
      <path d="M10 13.5l3 3 5-5"/>
    </svg>
    Évaluez votre conformité à la loi 16
  </button>
</div>

<div class="wrap">
  <div class="label">Option 2 — Clipboard avec coche (diagnostic / évaluation)</div>
  <button class="btn">
    <svg viewBox="0 0 28 28" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 5H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
      <rect x="10" y="3" width="8" height="4" rx="1"/>
      <path d="M10 14l2.5 2.5 5-5"/>
    </svg>
    Évaluez votre conformité à la loi 16
  </button>
</div>

<div class="wrap">
  <div class="label">Option 3 — Loupe (évaluation / analyse)</div>
  <button class="btn">
    <svg viewBox="0 0 28 28" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="7"/>
      <path d="M22 22l-5-5"/>
    </svg>
    Évaluez votre conformité à la loi 16
  </button>
</div>

</body>
</html>
